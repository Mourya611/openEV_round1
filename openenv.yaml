name: support-ticket-triage-openenv
version: 0.1.0
description: Real-world customer support ticket triage environment for agent training and evaluation.
authors:
  - Yarla Mourya Team
tags:
  - openenv
  - customer-support
  - triage
  - reinforcement-learning
entrypoint:
  type: http
  base_url_env: ENV_BASE_URL
  default_base_url: http://localhost:7860
api:
  reset: /reset
  step: /step
  state: /state
  tasks: /tasks
models:
  observation: envs.models.ObservationModel
  action: envs.models.TriageAction
  reward: envs.models.RewardModel
tasks:
  - name: ticket-triage-easy
    difficulty: easy
    objective: Prioritize and route common billing and security issues correctly.
    max_steps: 4
  - name: ticket-triage-medium
    difficulty: medium
    objective: Handle mixed bug/integration/compliance tickets with accurate routing.
    max_steps: 6
  - name: ticket-triage-hard
    difficulty: hard
    objective: Perform policy-safe triage under high urgency and conflicting constraints.
    max_steps: 8
reward_range:
  low: 0
  high: 1
endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state
  tasks: GET /tasks
  grade: GET /grade
